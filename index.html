<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Vault - Secure Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1117, #161b22);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .container {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      position: relative;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 32px;
      font-size: 1rem;
    }
    .input-group {
      position: relative;
      margin: 20px 0;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 1rem;
      border-radius: 6px;
      outline: none;
      transition: all 0.2s;
    }
    .input-group input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
    }
    .input-group::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: #8b949e;
    }
    .input-group.username::before { content: '\1F464'; } /* user icon */
    .input-group.email::before    { content: '\2709';  } /* email */
    .input-group.password::before { content: '\1F512'; } /* lock */

    button {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: linear-gradient(90deg, #238636, #2ea043);
      color: white;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.25s;
    }
    button:hover {
      background: linear-gradient(90deg, #2ea043, #3fb950);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(46,160,67,0.4);
    }
    .loader {
      display: none;
      margin: 40px auto;
      border: 5px solid #21262d;
      border-top: 5px solid #58a6ff;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .after-chaos {
      display: none;
      padding: 20px;
    }
    .chaos-text {
      font-size: 1.9rem;
      color: #ff4d6d;
      font-weight: 800;
      margin: 30px 0 20px;
      line-height: 1.35;
      animation: shake 0.7s infinite, glow 2s infinite alternate;
    }
    .blink { animation: blink 0.8s infinite; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      10%,30%,50%,70%,90% { transform: translateX(-5px); }
      20%,40%,60%,80% { transform: translateX(5px); }
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d; }
      to   { text-shadow: 0 0 30px #ff4d6d, 0 0 60px #ff4d6d; }
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 480px) {
      .container { padding: 30px 20px; border-radius: 0; min-height: 100vh; border: none; }
      .logo { font-size: 2rem; }
      .chaos-text { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<audio id="prankAudio" loop preload="auto">
  <source src="ad.mp3" type="audio/mpeg">
  <!-- Better loop example: https://gfxsounds.com/wp-content/uploads/2024/06/Adult-female-pleasure-moan-3.mp3 -->
  <!-- Or upload seamless moan to catbox.moe for direct link -->
</audio>

<div class="container">
  <div class="logo">Project Vault</div>
  <p class="subtitle">Sign in to access exclusive project files & resources</p>
  
  <div id="loginForm">
    <div class="input-group username">
      <input type="text" id="username" placeholder="Username or Nickname" autocomplete="off">
    </div>
    <div class="input-group email">
      <input type="email" id="email" placeholder="Email (Gmail preferred)" autocomplete="off">
    </div>
    <div class="input-group password">
      <input type="password" id="password" placeholder="Password" autocomplete="off">
    </div>
    <button onclick="fakeLogin()">LOGIN</button>
  </div>

  <div class="loader" id="loader"></div>

  <div id="chaosScreen" class="after-chaos">
    <p class="chaos-text blink">FUCK YOU MOTHERFUCKER 😂😂<br>PRANKED HARD BITCH!<br>PROJECT VENUMA DA LOOSU PUNDA?<br>GO FUCK YOURSELF OUTSIDE YOU HORNY LOSER 🤡🔥🔊</p>
    <p style="color:#58a6ff; font-size:1.15rem; margin-top:20px;">Audio won't stop da... enjoy these moans you desperate fuck 😈</p>
  </div>
</div>

<script>
  const audio = document.getElementById("prankAudio");
  const loginForm = document.getElementById("loginForm");
  const loader = document.getElementById("loader");
  const chaosScreen = document.getElementById("chaosScreen");

  function fakeLogin() {
    loginForm.style.display = "none";
    loader.style.display = "block";

    // Start audio INSTANTLY on click (muted first for autoplay rules)
    audio.muted = true;
    audio.volume = 1.0; // full blast
    audio.currentTime = 0;
    audio.play().catch(() => { console.log("Initial play blocked"); });

    setTimeout(() => {
      loader.style.display = "none";
      chaosScreen.style.display = "block";

      // Unmute & force full play after short delay (user interaction happened)
      setTimeout(() => {
        audio.muted = false;
        audio.play().catch(() => {});
      }, 300);

      // Extra blocks & restarts
      document.addEventListener('keydown', blockControls, true);
      document.addEventListener('contextmenu', e => e.preventDefault());
      window.onbeforeunload = () => "Can't escape yet motherfucker... moans keep playing 😈";

      audio.addEventListener('pause', restartAudio);
      audio.addEventListener('ended', restartAudio);
      audio.addEventListener('volumechange', () => { if (audio.volume < 0.8) audio.volume = 1.0; });

      // Any touch/click unmutes & replays
      document.body.addEventListener('click', forceUnmutePlay, {once: false});
      document.body.addEventListener('touchend', forceUnmutePlay, {once: false});
    }, 1600); // Short fake verify delay for realism
  }

  function forceUnmutePlay() {
    audio.muted = false;
    if (audio.paused) {
      audio.play().catch(() => {});
    }
  }

  function restartAudio() {
    setTimeout(() => {
      if (audio.paused || audio.ended) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }
    }, 200);
  }

  function blockControls(e) {
    const blocked = ["Escape", " ", "MediaStop", "MediaPlayPause", "AudioVolumeMute"];
    if (blocked.includes(e.key) || e.keyCode === 27) {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }
  }
</script>

</body>
</html>
