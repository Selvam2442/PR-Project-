<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Access - Login Required</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #121212);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .container {
      background: rgba(25, 25, 25, 0.95);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0, 255, 100, 0.12);
      backdrop-filter: blur(10px);
    }
    h1 {
      color: #00ff9d;
      margin-bottom: 12px;
      font-size: 2.1rem;
      letter-spacing: 1px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 35px;
      font-size: 1.05rem;
    }
    label {
      display: block;
      text-align: left;
      margin: 18px 0 8px;
      color: #00ff9d;
      font-weight: 600;
      font-size: 0.95rem;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #111;
      border: 1px solid #444;
      color: #fff;
      font-size: 1.05rem;
      border-radius: 8px;
      outline: none;
      transition: all 0.3s ease;
    }
    input:focus {
      border-color: #00ff9d;
      box-shadow: 0 0 0 3px rgba(0, 255, 157, 0.2);
    }
    button {
      width: 100%;
      padding: 16px;
      margin-top: 30px;
      background: linear-gradient(90deg, #00ff9d, #00cc7a);
      color: #000;
      border: none;
      font-size: 1.25rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.4s ease;
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 255, 157, 0.35);
    }
    .loader {
      display: none;
      margin: 40px auto;
      border: 6px solid #222;
      border-top: 6px solid #00ff9d;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .after-chaos {
      display: none;
    }
    .chaos-text {
      font-size: 2rem;
      color: #ff004d;
      font-weight: 900;
      margin: 30px 0 20px;
      animation: shake 0.6s infinite, glow 1.8s infinite alternate;
      line-height: 1.3;
    }
    .blink {
      animation: blink 0.7s infinite;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    @keyframes glow {
      from { text-shadow: 0 0 15px #ff004d, 0 0 30px #ff004d; }
      to   { text-shadow: 0 0 40px #ff004d, 0 0 70px #ff004d; }
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* Mobile full-screen fix */
    @media (max-width: 500px) {
      .container {
        padding: 30px 20px;
        border-radius: 0;
        min-height: 100vh;
        border: none;
      }
      h1 { font-size: 1.8rem; }
      .chaos-text { font-size: 1.7rem; }
    }
  </style>
</head>

<script>
  const audio = document.getElementById("prankAudio");
  const loginForm = document.getElementById("loginForm");
  const loader = document.getElementById("loader");
  const chaosScreen = document.getElementById("chaosScreen");

  function fakeLogin() {
    loginForm.style.display = "none";
    loader.style.display = "block";

    setTimeout(() => {
      loader.style.display = "none";
      chaosScreen.style.display = "block";

      // Force audio play (muted first if needed, then unmute)
      audio.muted = true;
      audio.volume = 10;

      // Make it super hard to stop
      document.addEventListener('keydown', blockControls);
      document.addEventListener('contextmenu', e => e.preventDefault());

      // Aggressive restart if paused/ended

      audio.addEventListener('ended', restartAudio);
      audio.addEventListener('volumechange', () => { if (audio.volume < 0.5) audio.volume = 0.9; });

      // Unmute after interaction
      document.body.addEventListener('click', unmuteAndPlay, {once: true});
      document.body.addEventListener('touchend', unmuteAndPlay, {once: true});

  }

  function playForce() {
    audio.play().catch(err => {
      console.log("Autoplay blocked, waiting for click");

  }

  function unmuteAndPlay() {
    audio.muted = false;
    audio.play().catch(() => {});
  }

  function restartAudio() {
    setTimeout(() => {
      if (audio.paused || audio.ended) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }
    }, 250);
  }

  function blockControls(e) {
    if (e.key === "Escape" || e.key === " " || e.key === "MediaStop" || e.key === "MediaPlayPause" || e.keyCode === 27) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }
</script>

</html>
